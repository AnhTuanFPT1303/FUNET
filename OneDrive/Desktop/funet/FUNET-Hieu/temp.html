<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook-like Navigation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="temp.css">
</head>
<body>
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
        <div class="centered d-flex flex-column h-100 justify-content-between py-4">
            <button id="home" class="btn btn-facebook flex-grow-1 d-flex flex-column align-items-center justify-content-center">
                <i class="bi bi-house-door-fill fs-1 mb-2"></i>
                <span>Home</span>
            </button>
            <button id="friendlist" class="btn btn-facebook flex-grow-1 d-flex flex-column align-items-center justify-content-center">
                <i class="bi bi-people-fill fs-1 mb-2"></i>
                <span>Friend List</span>
            </button>
            <button id="market" class="btn btn-facebook flex-grow-1 d-flex flex-column align-items-center justify-content-center">
                <i class="bi bi-shop fs-1 mb-2"></i>
                <span>Market</span>
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
